apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresdb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kelianlelu/k8s-tp-miage.git
    targetRevision: main
    path: postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true